# ==============================================================================
# ci.yml — Quality gate for pull requests and pushes to main
#
# Triggers
#   • Pull request (any branch → main)  → lint + build check (no push)
#   • Push to `main`                    → lint + build check (no push)
#
# Steps
#   1. hadolint   — Dockerfile best-practices linter (config: .hadolint.yaml)
#   2. docker build (amd64 only, no push) — validates the image actually builds
#
# These checks must pass before a PR can be merged (configure branch
# protection to require the "ci / build-check" status check).
# ==============================================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  build-check:
    name: Build image (no push)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
