name: Build & Push Docker images

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  discover-variants:
    name: Discover variants
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.list.outputs.variants }}
    steps:
      - uses: actions/checkout@v5
      - id: list
        run: |
          variants=$(ls -1 variants | jq -R . | jq -s -c .)
          echo "variants=$variants" >> "$GITHUB_OUTPUT"
          echo "Discovered variants: $variants"

  build-base:
    name: Build base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/mk0e/ccbox-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

  build-variants:
    name: Build variant ${{ matrix.variant }}
    needs: [discover-variants, build-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.discover-variants.outputs.variants) }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/mk0e/ccbox
          tags: |
            type=raw,value=${{ matrix.variant }},enable=${{ github.event_name != 'release' }}
            type=semver,pattern={{version}}-${{ matrix.variant }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ matrix.variant == 'docs' && github.event_name != 'release' }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: variants/${{ matrix.variant }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=ghcr.io/mk0e/ccbox-base:latest
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max
