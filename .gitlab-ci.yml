stages:
  - validate
  - publish
  - update-gist

# ------------------------------------------------------------------------------
# build-check — validates the Dockerfile builds (no push)
# Runs on every commit and merge request.
# ------------------------------------------------------------------------------
build-check:
  stage: validate
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  script:
    - docker buildx create --use --name check
    - docker buildx build --platform linux/amd64 .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ------------------------------------------------------------------------------
# build-and-push — multi-arch build, pushes to ghcr.io
# Runs on main branch pushes, scheduled pipelines, and version tags.
# ------------------------------------------------------------------------------
build-and-push:
  stage: publish
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
    GITHUB_REGISTRY: ghcr.io
    GITHUB_IMAGE: ghcr.io/moritzbutzmann/ccbox
  before_script:
    - echo "$GITHUB_TOKEN" | docker login $GITHUB_REGISTRY -u $GITHUB_USERNAME --password-stdin
    - docker buildx create --use --name multiarch
    - docker buildx inspect --bootstrap
  script:
    - |
      TAGS="-t $GITHUB_IMAGE:latest"
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="$TAGS -t $GITHUB_IMAGE:$CI_COMMIT_TAG"
      fi
    - docker buildx build
        --platform linux/amd64,linux/arm64
        $TAGS
        --push .
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_TAG =~ /^v/

update-gist:
  stage: update-gist
  image: alpine:latest
  script:
    - apk add --no-cache curl jq
    - |
      CONTENT=$(jq -Rs '.' install.sh)
      curl -s -X PATCH \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/gists/$GIST_ID" \
        -d "{\"files\":{\"cc-box-install.sh\":{\"content\":$CONTENT}}}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - install.sh
