stages:
  - validate
  - publish

# ------------------------------------------------------------------------------
# build-check — validates the base + every variant Dockerfile builds (no push)
# Runs on every commit and merge request.
# ------------------------------------------------------------------------------
build-check-base:
  stage: validate
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  script:
    - docker buildx create --use --name check
    - docker buildx build --platform linux/amd64 -t ccbox-base:latest --load .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

build-check-variant:
  stage: validate
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - build-check-base
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  script:
    - docker buildx create --use --name check
    - docker buildx build --platform linux/amd64 -f variants/$VARIANT/Dockerfile --build-arg BASE_IMAGE=ccbox-base:latest .
  parallel:
    matrix:
      - VARIANT: [docs, diy-news-collector]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ------------------------------------------------------------------------------
# build-and-push — multi-arch build, pushes to ghcr.io
# Runs on main branch pushes, scheduled pipelines, and version tags.
# ------------------------------------------------------------------------------
build-and-push-base:
  stage: publish
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
    GITHUB_REGISTRY: ghcr.io
    GITHUB_IMAGE: ghcr.io/mk0e/ccbox-base
  before_script:
    - echo "$GITHUB_TOKEN" | docker login $GITHUB_REGISTRY -u $GITHUB_USERNAME --password-stdin
    - docker buildx create --use --name multiarch
    - docker buildx inspect --bootstrap
  script:
    - docker buildx build
        --platform linux/amd64,linux/arm64
        -t $GITHUB_IMAGE:latest
        --push .
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_TAG =~ /^v/

build-and-push-variant:
  stage: publish
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - build-and-push-base
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
    GITHUB_REGISTRY: ghcr.io
    GITHUB_IMAGE: ghcr.io/mk0e/ccbox
  before_script:
    - echo "$GITHUB_TOKEN" | docker login $GITHUB_REGISTRY -u $GITHUB_USERNAME --password-stdin
    - docker buildx create --use --name multiarch
    - docker buildx inspect --bootstrap
  script:
    - |
      TAGS="-t $GITHUB_IMAGE:$VARIANT"
      if [ "$VARIANT" = "docs" ]; then
        TAGS="$TAGS -t $GITHUB_IMAGE:latest"
      fi
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="$TAGS -t $GITHUB_IMAGE:$CI_COMMIT_TAG-$VARIANT"
      fi
    - docker buildx build
        --platform linux/amd64,linux/arm64
        --build-arg BASE_IMAGE=ghcr.io/mk0e/ccbox-base:latest
        -f variants/$VARIANT/Dockerfile
        $TAGS
        --push .
  parallel:
    matrix:
      - VARIANT: [docs, diy-news-collector]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_TAG =~ /^v/
